ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architectural discussion, code review, and drafting. All
  design decisions,building, the scoring weights, and the honeypot logic were chosen and
  verified by the team against the challenge spec and the real candidate pool.
  No candidate data was fed to any hosted LLM, and the ranker itself makes no
  network or LLM calls at rank time.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  An explainable multi-stage ranker with a JD-driven front end. A transparent,
  rule-based reader parses the job description and derives the component
  weights, experience band, semantic query, and active disqualifiers — bounded
  around hand-tuned priors so a lopsided JD can shift emphasis but not produce a
  degenerate ranking. No LLM or network is used, so it adds nothing to compute.
  Each profile is then streamed once and reduced to interpretable features. The
  score is an additive, JD-weighted blend of five components — title-and-career
  fit, skill trust, semantic similarity, experience band, and location — then
  multiplied by a disqualifier penalty and a behavioural modifier. Skill trust
  tempers each claimed proficiency by endorsements, duration, and description
  mentions, so an unsupported "expert" tag collapses toward zero; this defeats
  keyword stuffing. Semantic similarity blends TF-IDF cosine with BM25 locally.
  A separate honeypot gate forces profiles with internal impossibilities to the
  bottom, tuned for precision. An optional local dense-embedding layer enhances
  ranking when present and degrades gracefully otherwise. Reasoning text is
  assembled from each candidate's own facts. Ranking runs CPU-only, no network,
  within the five-minute budget.

